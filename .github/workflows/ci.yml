name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Provide stub values so Next.js build doesn't fail on missing env vars.
          # These are NOT real credentials — build-time only.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_APP_URL: https://placeholder.vercel.app
          WHATSAPP_ACCESS_TOKEN: placeholder
          WHATSAPP_PHONE_NUMBER_ID: placeholder
          WHATSAPP_WEBHOOK_VERIFY_TOKEN: placeholder
          PAYSTACK_SECRET_KEY: placeholder
          PAYSTACK_PUBLIC_KEY: placeholder
          CRON_SECRET: placeholder
          ENCRYPTION_SECRET: placeholder-32-char-encryption-key-x
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
